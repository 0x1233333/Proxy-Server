name: Advanced SubConverter Aggregator

on:
  schedule:
    - cron: '0 1 * * *' 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aggregate-and-convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Aggregator in Virtual Environment
        run: |
          # 创建并激活虚拟环境
          python -m venv venv
          source venv/bin/activate
          # 安装依赖并执行重构代码
          pip install --upgrade pip
          pip install -r requirements.txt
          python main.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update proxy nodes with external subconverter backend"
          file_pattern: sub.txt
