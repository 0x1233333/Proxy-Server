name: Omnipotent Sub Aggregator

on:
  schedule:
    - cron: '15 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aggregate-and-convert:
    runs-on: ubuntu-latest
    # 添加环境变量，强制 Actions 启用最新的 Node.js 24 以消除弃用警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Aggregator in Virtual Environment
        run: |
          # 建立并激活虚拟环境
          python -m venv venv
          source venv/bin/activate
          # 安装依赖
          pip install --upgrade pip
          pip install -r requirements.txt
          # 执行增量节点采集代码
          python main.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update all-protocol proxy nodes with State Mapping"
          file_pattern: "sub.txt node_mapping.json"
