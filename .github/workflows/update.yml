name: Omnipotent Sub Aggregator

on:
  schedule:
    # 每天 UTC 02:15 运行 (对应北京时间 10:15)
    - cron: '15 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aggregate-and-convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Aggregator in Virtual Environment
        run: |
          # 建立并激活虚拟环境
          python -m venv venv
          source venv/bin/activate
          # 安装依赖
          pip install --upgrade pip
          pip install -r requirements.txt
          # 执行增量节点采集代码
          python main.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update all-protocol proxy nodes with State Mapping"
          # 注意：加入了 node_mapping.json，以确保节点状态库得到同步
          file_pattern: "sub.txt node_mapping.json"
