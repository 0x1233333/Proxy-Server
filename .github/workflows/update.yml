name: Omnipotent Sub Aggregator

on:
  schedule:
    # 每天 UTC 02:15 运行 (对应北京时间 10:15)
    - cron: '15 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aggregate-and-convert:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Aggregator in Virtual Environment
        run: |
          # 强制清理可能被误提交到仓库的旧虚拟环境文件夹，防止冲突
          rm -rf venv
          # 建立并激活全新的虚拟环境
          python3 -m venv venv
          source venv/bin/activate
          # 安装依赖
          pip install --upgrade pip
          pip install -r requirements.txt
          # 执行纯净全量收集代码
          python main.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update proxy nodes (Fast & Pure Edition)"
          # 只需提交最终的订阅文件即可
          file_pattern: "sub.txt"
